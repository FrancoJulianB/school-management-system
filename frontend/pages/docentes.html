<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Docentes</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<header class="header">School Management System</header>

<div class="layout">
    <aside class="sidebar">
        <a href="../index.html">🏠 Dashboard</a>
        <a href="alumnos.html">🎓 Alumnos</a>
        <a href="cursos.html">🏫 Cursos</a>
        <a href="materias.html">📚 Materias</a>
        <a href="docentes.html">👨‍🏫 Docentes</a>
        <a href="cursos-materias.html">🔗 Curso-Materia</a>
        <a href="inscripciones.html">📝 Inscripciones</a>
        <a href="asistencias.html">✔️ Asistencias</a>
        <a href="calificaciones.html">⭐ Calificaciones</a>
    </aside>

    <main class="content">
        <div class="card">
            <div class="page-header">
                <div>
                    <h1>Gestión de Docentes</h1>
                    <p>Administración de docentes del establecimiento.</p>
                </div>
                <button class="btn-primary" onclick="openCreateDocenteModal()">+ Nuevo Docente</button>
            </div>
        </div>

        <div class="card">
            <div class="toolbar">
                <h2>Listado de docentes</h2>
                <input class="search-input" type="text" id="searchInput" placeholder="Buscar por nombre, apellido o DNI">
            </div>

            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>DNI</th>
                    <th>Email</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody id="docentesTable"></tbody>
            </table>

            <div id="message" class="message"></div>
        </div>
    </main>
</div>

<div id="docenteModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Nuevo Docente</h2>
            <button class="close-button" onclick="closeDocenteModal()">×</button>
        </div>

        <form id="docenteForm">
            <input type="hidden" id="docenteId">

            <div class="form-group" id="idDisplayGroup" style="display:none; margin-bottom:16px;">
                <label>ID</label>
                <input type="text" id="idDisplay" disabled>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="nombre" required>
                </div>

                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" id="apellido" required>
                </div>

                <div class="form-group">
                    <label>DNI</label>
                    <input type="text" id="dni" required>
                </div>

                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" id="telefono">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>
            </div>

            <br>

            <button type="submit" class="btn-primary">Guardar</button>
            <button type="button" class="btn-secondary" onclick="closeDocenteModal()">Cancelar</button>
        </form>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/common.js"></script>
<script src="../js/modal.js"></script>
<script src="../js/docentes.js"></script>

</body>
</html>
